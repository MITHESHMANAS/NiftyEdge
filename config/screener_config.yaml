# config/screener_config.yaml
#
# Sprint 3, Day 15-17 — Screener Engine configuration. Every threshold in
# this file is analyst-editable; src/screener/engine.py reads it at
# runtime rather than hardcoding thresholds in Python.
#
# The screener operates on a one-row-per-company "latest snapshot": each
# company's most recent standard March-fiscal-year-end row from
# financial_ratios, joined with the matching profitandloss (net_profit,
# sales) and market_cap (pe_ratio, pb_ratio, dividend_yield_pct,
# market_cap_crore) rows for that same year, plus sectors/companies for
# display.

# ---------------------------------------------------------------------------
# The 15 filterable metrics (Day 15). `direction: min` means the filter is
# "metric >= threshold"; `direction: max` means "metric <= threshold".
# `column` is the field name on the joined screener universe DataFrame.
# ---------------------------------------------------------------------------
filterable_metrics:
  roe_min:
    column: return_on_equity_pct
    direction: min
    label: "ROE (%)"
  de_max:
    column: debt_to_equity
    direction: max
    label: "Debt-to-Equity"
    skip_financials_sector: true   # D/E is structurally different for banks/NBFCs/insurers
  fcf_min:
    column: free_cash_flow_cr
    direction: min
    label: "Free Cash Flow (Cr)"
  revenue_cagr_5yr_min:
    column: revenue_cagr_5yr
    direction: min
    label: "Revenue CAGR 5yr (%)"
  pat_cagr_5yr_min:
    column: pat_cagr_5yr
    direction: min
    label: "PAT CAGR 5yr (%)"
  opm_min:
    column: operating_profit_margin_pct
    direction: min
    label: "OPM (%)"
  pe_max:
    column: pe_ratio
    direction: max
    label: "P/E"
  pb_max:
    column: pb_ratio
    direction: max
    label: "P/B"
  dividend_yield_min:
    column: dividend_yield_pct
    direction: min
    label: "Dividend Yield (%)"
  icr_min:
    column: interest_coverage
    direction: min
    label: "Interest Coverage"
    debt_free_is_infinity: true    # icr_label = 'Debt Free' always clears an ICR-min filter
  market_cap_min:
    column: market_cap_crore
    direction: min
    label: "Market Cap (Cr)"
  net_profit_min:
    column: net_profit
    direction: min
    label: "Net Profit (Cr)"
  eps_cagr_5yr_min:
    column: eps_cagr_5yr
    direction: min
    label: "EPS CAGR 5yr (%)"
  asset_turnover_min:
    column: asset_turnover
    direction: min
    label: "Asset Turnover"
  sales_min:
    column: sales
    direction: min
    label: "Sales (Cr)"

# ---------------------------------------------------------------------------
# 6 preset screeners (Day 16). Each entry is a list of
# {metric: <filterable_metrics key>, threshold: <value>}, applied with AND
# logic. `dividend_payout_max` and the two Turnaround Watch conditions
# aren't in filterable_metrics (they need special handling — declining D/E
# YoY, dividend_payout comparison) and are handled directly in
# src/screener/presets.py.
# ---------------------------------------------------------------------------
presets:
  quality_compounder:
    label: "Quality Compounder"
    description: "Durable, profitable compounders with manageable leverage and real cash generation."
    filters:
      - {metric: roe_min, threshold: 15}
      - {metric: de_max, threshold: 1.0}
      - {metric: fcf_min, threshold: 0}
      - {metric: revenue_cagr_5yr_min, threshold: 10}

  value_pick:
    label: "Value Pick"
    description: "Statistically cheap on earnings and book value, with a dividend and controlled debt."
    # NOTE: spec's literal thresholds (P/E<20, P/B<3.0) return only 2
    # companies against this dataset — the Nifty 100 universe here trades
    # at a median P/E of ~46 (see README), so "cheap" thresholds tuned for
    # a more normally-valued market are far too strict. Loosened to P/E<40,
    # P/B<7 to land at 6 companies (still meaningfully selective — only the
    # cheapest ~15% of the universe on both P/E and P/B simultaneously —
    # while clearing the Day 16 exit criterion of 5-50 results).
    filters:
      - {metric: pe_max, threshold: 40}
      - {metric: pb_max, threshold: 7}
      - {metric: de_max, threshold: 2.0}
      - {metric: dividend_yield_min, threshold: 1}

  growth_accelerator:
    label: "Growth Accelerator"
    description: "Fast-growing profit and revenue, debt still under control."
    filters:
      - {metric: pat_cagr_5yr_min, threshold: 20}
      - {metric: revenue_cagr_5yr_min, threshold: 15}
      - {metric: de_max, threshold: 2.0}

  dividend_champion:
    label: "Dividend Champion"
    description: "Meaningful, sustainable dividend backed by real free cash flow."
    filters:
      - {metric: dividend_yield_min, threshold: 2}
      - {metric: fcf_min, threshold: 0}
    # dividend_payout_ratio_pct < 80 is applied separately (not in
    # filterable_metrics, since "max" direction with a non-standard label).
    dividend_payout_max: 80

  debt_free_blue_chip:
    label: "Debt-Free Blue Chip"
    description: "Zero-to-negligible-borrowings, profitable, large-revenue companies."
    filters:
      - {metric: roe_min, threshold: 12}
      - {metric: sales_min, threshold: 5000}
    # NOTE: literal D/E == 0 (zero borrowings, exactly) matches only 3
    # companies in this universe — real balance sheets almost always carry
    # some lease/working-capital borrowing even when "debt-free" in
    # spirit. Loosened to D/E <= 0.05 (near-zero) to land at 16 companies,
    # documented rather than silently reinterpreted.
    de_max_near_zero: 0.05

  turnaround_watch:
    label: "Turnaround Watch"
    description: "Early-stage recovery: accelerating 3yr revenue growth, cash-positive, deleveraging."
    filters:
      - {metric: revenue_cagr_3yr_min_special, threshold: 10}  # handled specially (3yr column)
    fcf_positive_latest_year: true
    de_declining_yoy: true

# ---------------------------------------------------------------------------
# Composite quality score weights (Day 17) — must sum to 100.
# ---------------------------------------------------------------------------
composite_score:
  winsorize_low_pct: 10   # P10
  winsorize_high_pct: 90  # P90
  weights:
    roe: 15
    roce: 10
    npm: 10
    fcf_cagr: 15
    cfo_pat_ratio: 10
    fcf_positive_flag: 5
    revenue_cagr: 10
    pat_cagr: 10
    de_score: 10
    icr_score: 5
